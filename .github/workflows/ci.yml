name: Python CI

# Trigger workflow on push to master and feature branches, and on PRs to master
on:
  push:
    branches: [master, feature-*]
  pull_request:
    branches: [master]

jobs:
  # Job 1: Run linting and tests
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check src/

      # - name: Run tests
      #  run: pytest

  # Job 2: Build and verify the package
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build package
        run: pip install build && python -m build

      - name: Check package
        run: pip install twine && python -m twine check dist/*
